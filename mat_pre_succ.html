<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Matematica - Precedente e Successivo</title>
  <link rel="stylesheet" href="css/italiano_common.css" />
  <link rel="stylesheet" href="css/mat_pre_succ.css" />
</head>
<body>
  <div class="wrap">
   <div class="topbar">
  <div class="title">MATEMATICA • PRECEDENTE / SUCCESSIVO</div>

  <div class="topControls">
    

    <button class="topBtn" id="zoomOutBtn" title="Zoom −">−</button>

    <div class="zoomBox" title="Zoom">
      <span id="zoomVal">100%</span>
      <select id="zoomSel" class="zoomSel" aria-label="Zoom">
         <option value="0.6">60%</option>
         <option value="0.7" >70%</option>
        <option value="0.8">80%</option>
        <option value="0.9"  selected>90%</option>
        <option value="1" >100%</option>
        <option value="1.1">110%</option>
        <option value="1.2">120%</option>
        <option value="1.3">130%</option>
        <option value="1.4">140%</option>
        <option value="1.5">150%</option>
        <option value="1.6">160%</option>
      </select>
    </div>

    <button class="topBtn" id="zoomInBtn" title="Zoom +">+</button>
    <button class="topBtn homeBtn" title="Home"
      onclick="window.location.href='giochi_didattici.html'">🏠</button>
  </div>


</div>

    <div class="panel">
      <div class="msg" id="msg">Scrivi il numero precedente e quello successivo.</div>

      <div class="grid">
        <div class="box">
          <div class="lbl">PRECEDENTE</div>
          <input id="prevIn" class="numIn" inputmode="numeric" autocomplete="off" />
        </div>

        <div class="center">
          <div class="lbl">NUMERO</div>
          <div id="centerNum" class="centerNum">—</div>

          <div class="controls">
            <label class="smallLbl">DA</label>
            <select id="minSel" class="sel">
              <option value="0" selected>0</option>
              <option value="1">1</option>
              <option value="10">10</option>
            </select>

            <label class="smallLbl">A</label>
            <select id="maxSel" class="sel">
              <option value="20" selected>20</option>
              <option value="50">50</option>
              <option value="100">100</option>
              <option value="1000">1000</option>
              <option value="10000">10000</option>
            </select>

            <label class="smallLbl">PASSO</label>
            <select id="stepSel" class="sel">
              <option value="1" selected>1</option>
              <option value="2">2</option>
              <option value="5">5</option>
              <option value="10">10</option>
            </select>
          </div>
        </div>

        <div class="box">
          <div class="lbl">SUCCESSIVO</div>
          <input id="nextIn" class="numIn" inputmode="numeric" autocomplete="off" />
        </div>
      </div>
    </div>



  <div class="actions">
  <button class="gameBtn reset" id="resetBtn">↺ RESET</button>
  <button class="gameBtn check" id="checkBtn">✔ VERIFICA</button>
  <button class="gameBtn next" id="newBtn">➜ PROSSIMO</button>
</div>

  </div>

  

  <script src="js/nav.js"></script>
<script src="js/menu.js"></script>
  <script src="js/mat_pre_succ.js"></script>
</body>
</html>
