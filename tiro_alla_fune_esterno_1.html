<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Matematica - Tiro alla Fune</title>

  <style>
    :root{
      --bg1:#1c2e6a;
      --bg2:#0f1f4a;
      --panel:#ffffff;
      --text:#ffffff;
      --accent:#ffb300;
      --accent2:#2c7be5;
      --shadow:0 10px 24px rgba(0,0,0,.22);
      --radius:18px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 30% 20%, #3f6ad8 0%, transparent 40%),
        radial-gradient(circle at 80% 10%, #5c7cff 0%, transparent 35%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      min-height:100vh;
    }

    .page{
      width:min(1400px, 96vw);
      margin:18px auto;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:14px 16px;
      border-radius:20px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:var(--shadow);
      backdrop-filter: blur(6px);
    }

    .titleBox{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .icon{
      width:52px;
      height:52px;
      border-radius:14px;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg,#ffd54f,#ffb300);
      color:#1c2e6a;
      font-size:28px;
      box-shadow:0 6px 14px rgba(0,0,0,.20);
      flex:0 0 auto;
    }

    .titleWrap{
      min-width:0;
    }

    .title{
      margin:0;
      font-size:clamp(22px, 2.5vw, 34px);
      font-weight:900;
      line-height:1.05;
    }

    .subtitle{
      margin:4px 0 0;
      font-size:clamp(13px, 1.5vw, 16px);
      opacity:.95;
    }

    .actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      text-decoration:none;
      color:#fff;
      font-weight:900;
      font-size:15px;
      border-radius:14px;
      padding:12px 16px;
      box-shadow:0 6px 14px rgba(0,0,0,.22);
      transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
      white-space:nowrap;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .btn:hover{ transform:translateY(-1px); }
    .btn:active{ transform:translateY(1px); }

    .btnHome{
      background:linear-gradient(180deg,#4aa3ff,#2c7be5);
    }

    .btnOpen{
      background:linear-gradient(180deg,#35c96b,#1fa44c);
    }

    .panel{
      margin-top:16px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.14);
      border-radius:22px;
      padding:14px;
      box-shadow:var(--shadow);
    }

    .info{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:12px;
      padding:12px 14px;
      border-radius:16px;
      background:rgba(255,255,255,.10);
    }

    .infoText{
      font-size:15px;
      line-height:1.4;
    }

    .frameWrap{
      position:relative;
      width:100%;
      height:calc(100vh - 185px);
      min-height:520px;
      border-radius:18px;
      overflow:hidden;
      background:#ffffff;
      border:3px solid rgba(255,255,255,.18);
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      display:block;
      background:#fff;
    }

    .fallback{
      display:none;
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,#f7fbff,#eaf3ff);
      color:#123;
      padding:24px;
      text-align:center;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:14px;
    }

    .fallback.show{
      display:flex;
    }

    .fallbackCard{
      width:min(680px, 92%);
      background:#fff;
      border-radius:20px;
      padding:24px;
      box-shadow:0 12px 28px rgba(0,0,0,.14);
    }

    .fallback h2{
      margin:0 0 10px;
      font-size:clamp(22px, 3vw, 32px);
      color:#1c2e6a;
    }

    .fallback p{
      margin:0 0 16px;
      font-size:16px;
      line-height:1.5;
      color:#334;
    }

    .btnFallback{
      background:linear-gradient(180deg,#ff8f00,#ef6c00);
    }

    @media (max-width: 820px){
      .topbar{
        flex-direction:column;
        align-items:stretch;
      }

      .actions{
        justify-content:stretch;
      }

      .actions .btn{
        flex:1 1 220px;
      }

      .frameWrap{
        height:calc(100vh - 240px);
        min-height:460px;
      }
    }

    @media (max-width: 560px){
      .page{
        width:95vw;
        margin:10px auto;
      }

      .topbar{
        padding:12px;
        border-radius:16px;
      }

      .panel{
        padding:10px;
        border-radius:16px;
      }

      .info{
        padding:10px 12px;
        border-radius:14px;
      }

      .frameWrap{
        min-height:420px;
        border-radius:14px;
      }

      .btn{
        font-size:14px;
        padding:11px 14px;
      }
    }
  </style>
</head>
<body>

  <script src="js/nav.js"></script>
  <script src="js/menu.js"></script>


  <div class="page">
    <div class="topbar">
      <div class="titleBox">
        <div class="icon">🪢</div>
        <div class="titleWrap">
          <h1 class="title">MATEMATICA • TIRO ALLA FUNE</h1>
          <div class="subtitle">Gioco esterno integrato nel portale</div>
        </div>
      </div>

      <div class="actions">
        <a class="btn btnHome" href="matematica.html">🏠 Torna a Matematica</a>
        <!-- <a class="btn btnOpen" href="https://edugames.uz/game/arqon/" target="_blank" rel="noopener noreferrer">🔗 Apri in nuova scheda</a> -->
      </div>
    </div>

   <!-- <div class="panel">
      <div class="info">
        <div class="infoText">
          Se il sito esterno non si vede qui sotto, premi <strong>“Apri in nuova scheda”</strong>.
        </div>
      </div>
    -->
      <div class="frameWrap">
        <iframe
          id="gameFrame"
          src="https://edugames.uz/game/arqon/"
          title="Gioco esterno - Tiro alla fune"
          loading="lazy">
        </iframe>

        <div id="fallback" class="fallback">
          <div class="fallbackCard">
            <h2>Il sito esterno non può essere mostrato dentro questa pagina</h2>
            <p>
              Alcuni siti bloccano l'apertura dentro un riquadro interno.
              Puoi comunque avviare il gioco con il pulsante qui sotto.
            </p>
            <a class="btn btnFallback" href="https://edugames.uz/game/arqon/" target="_blank" rel="noopener noreferrer">
              🚀 Apri il gioco
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const frame = document.getElementById("gameFrame");
    const fallback = document.getElementById("fallback");

    let loadedOk = false;

    frame.addEventListener("load", () => {
      loadedOk = true;
    });

    setTimeout(() => {
      try {
        if (!loadedOk) {
          fallback.classList.add("show");
        }
      } catch (e) {
        fallback.classList.add("show");
      }
    }, 3500);
  </script>
</body>
</html>
